<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300 skiptranslate">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAusInd Bridge Foundation</title>
   


    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0C2340",
                        secondary: "#F5C642",
                        accent: "#1E3A5F",
                        light: "#F8F9FA"
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
.goog-te-banner-frame.skiptranslate,
.goog-te-banner-frame {
  display: none !important;
}

iframe.goog-te-banner-frame {
  visibility: hidden !important;
}

body, html {
  top: 0px !important;
  margin-top: 0 !important;
}

.goog-tooltip,
.goog-tooltip:hover {
  display: none !important;
}

.goog-text-highlight {
  background-color: transparent !important;
  box-shadow: none !important;
}

.goog-te-gadget {
  height: 0 !important;
  overflow: hidden;
}

</style>


    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Smooth theme fade */
        .theme-transition {
            transition: background-color .4s ease, color .4s ease;
        }

        /* Mobile menu hidden by default */
        .mobile-menu {
            display: none;
        }
        .mobile-menu.open {
            display: block;
            animation: fadeSlide .3s ease-out forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Desktop menu hover underline */
        .nav-link {
            color: #0C2340;
            position: relative;
            transition: .3s;
            font-weight: 500;
        }
        .nav-link:hover {
            color: orange;
        }
        .underline-hover {
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 3px;
            background: orange;
            transition: width .3s;
        }
        .group:hover .underline-hover {
            width: 100%;
        }

        /* Mobile menu items */
        .mobile-item {
            display: block;
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            color: #dbe6f4;
            font-weight: 500;
        }
        .mobile-item:hover {
            background: #f5f5f5;
        }

        /* Theme toggle button */
        .theme-toggle-btn {
            background: transparent;
            border: 1px solid #d1d5db;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .3s;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.1);
            background-color: rgba(255,255,255,0.15);
        }

        .theme-icon-dark {
            display: none;
        }
        .dark .theme-icon-light {
            display: none;
        }
        .dark .theme-icon-dark {
            display: block;
        }

        /* Search dropdown */
        .search-dropdown {
            display: none;
        }
        .search-dropdown.open {
            display: block;
            animation: fadeSlide .2s ease-out;
        }

        /* Language dropdown */
        .language-dropdown {
            display: none;
        }
        .language-dropdown.open {
            display: block;
            animation: fadeSlide .2s ease-out;
        }

        /* DARK MODE OVERRIDES */
        .dark body {
            background-color: #111827 !important;
            color: #f3f4f6 !important;
        }
        .dark nav {
            background-color: #1f2937 !important;
        }
        .dark .mobile-item {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
        }
        .dark .mobile-item:hover {
            background-color: #374151 !important;
        }
        .dark .nav-link {
            color: #e5e7eb !important;
        }
        .dark .nav-link:hover {
            color: #F5C642 !important;
        }

        /* SSL Certificate Indicator */
        .ssl-indicator {
            font-size: 0.7rem;
            background: linear-gradient(45deg, #10b981, #34d399);
        }

        /* Domain Badge */
        .domain-badge {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>

<body class="bg-white theme-transition font-sans">

    <!-- Google Translate Hidden Container -->
<div id="google_translate_element" style="display:none;"></div>


    
    <!-- MAIN NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-white shadow-lg theme-transition">
        <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">

                <!-- LEFT: Logo with Full Organization Name -->
                <a href="index.html" class="flex items-center space-x-4">
                    <div class="w-36 h-full rounded-lg overflow-hidden">
                        <img src="images/LogoHz.png" alt="AIBF Logo" class="w-full h-full object-cover">
                    </div>

                </a>

                <!-- CENTER: Desktop Navigation -->
                <div class="hidden lg:flex items-center space-x-6">

    <a href="index.html" class="nav-link group" data-translate="home">
        Home <span class="underline-hover"></span>
    </a>

    <a href="about.html" class="nav-link group"  data-translate="about">
        About Us <span class="underline-hover"></span>
    </a>

    <a href="team.html" class="nav-link group" data-translate="board">
    Team <span class="underline-hover"></span>
    </a>

    <a href="news.html" class="nav-link group" data-translate="news">
        News <span class="underline-hover"></span>
    </a>

    <!-- <a href="media.html" class="nav-link group" data-translate="Media">
        Media <span class="underline-hover"></span>
    </a>  -->

     <a href="contact.html" class="nav-link group" data-translate="contact">
        Contact Us <span class="underline-hover"></span>
    </a>

    

</div>


                <!-- RIGHT: Search, Translation, and Contact Button -->
                <div class="flex items-center space-x-4">
                    <!-- Search Button with Dropdown -->
                    <div class="relative">
                        <button id="searchBtn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors" aria-label="Search">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </button>
                        <div id="searchDropdown" class="search-dropdown absolute right-0 mt-2 w-80 bg-white dark:bg-white-800 rounded-lg shadow-xl border dark:border-gray-700 z-50">
                            <div class="p-4">
                                <div class="relative">
                                    <input
  id="searchInput"
  type="text"
  placeholder="Search website..."
  class="w-full px-4 py-3 pl-10 bg-gray-50 dark:bg-white-900 border dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary"
/>

<div
  id="searchResults"
  class="hidden mt-2 max-h-64 overflow-auto bg-white dark:bg-white-800 border dark:border-gray-700 rounded-lg shadow"
></div>
                                    <svg class="absolute left-3 top-3 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                                <div class="mt-2 text-xs text-gray-500 dark:text-gray-400">
                                    Press Enter to search
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Translation Button with Dropdown -->
                    <div class="relative">
                        <button id="languageBtn" class="flex items-center space-x-1 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
                            </svg>
                            <span class="text-sm">EN</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div id="languageDropdown" class="language-dropdown absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-xl border dark:border-gray-700 z-50">
                            <div class="py-2">
                                <div class="px-4 py-2 text-xs text-gray-500 dark:text-gray-400 border-b dark:border-gray-700">Select Language</div>
                                <button class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2" onclick="googleTranslate('en')">
                                    <span class="font-medium">English</span>
                                    <span class="text-xs text-gray-500">(EN)</span>
                                </button>
                                <button class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2" onclick="googleTranslate('hi')">
                                    <span>हिन्दी</span>
                                    <span class="text-xs text-gray-500">(HI)</span>
                                </button>
                                <button class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2" onclick="googleTranslate('zh-CN')">
                                    <span>中文</span>
                                    <span class="text-xs text-gray-500">(ZH)</span>
                                </button>
                                <button class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2" onclick="googleTranslate('es')">
                                    <span>Español</span>
                                    <span class="text-xs text-gray-500">(ES)</span>
                                </button>
                                <button class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2" onclick="googleTranslate('ar')">
                                    <span>العربية</span>
                                    <span class="text-xs text-gray-500">(AR)</span>
                                </button>
                            </div>
                        </div>
                    </div>


                    <!-- Mobile Menu Button -->
                    <button id="mobileBtn" class="lg:hidden p-2 text-primary dark:text-gray-900">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu" class="mobile-menu fixed top-20 left-0 w-full bg-white dark:bg-gray-800 shadow-lg lg:hidden z-50 theme-transition border-t dark:border-gray-700">
        <a href="index.html" class="mobile-item">Home</a>
        <a href="about.html" class="mobile-item">About Us</a>
        
        <a href="team.html" class="mobile-item">Team</a>
        <a href="news.html" class="mobile-item">News</a>
        <a href="contact.html" class="mobile-item">Contact Us</a>
       

        <!-- Mobile Search and Language -->
        <div class="p-4 border-t dark:border-gray-700">
            <div class="flex space-x-2 mb-3">
                <input type="text" placeholder="Search..." class="flex-1 px-3 py-2 bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded">
                <button class="px-4 py-2 bg-primary text-white rounded">Go</button>
            </div>
            
            <div class="flex items-center justify-between">
                <select class="px-3 py-2 bg-white-50 dark:bg-white-900 border dark:border-gray-700 rounded text-sm">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                    <option value="zh">中文</option>
                    <option value="es">Español</option>
                </select>
                
                
            </div>
        </div>
    </div>
