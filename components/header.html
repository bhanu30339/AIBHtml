<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBF Header</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0C2340",
                        secondary: "#F5C642"
                    }
                }
            }
        }
    </script>

    <style>
        /* Smooth theme fade */
        .theme-transition {
            transition: background-color .4s ease, color .4s ease;
        }

        /* Mobile menu hidden by default */
        .mobile-menu {
            display: none;
        }
        .mobile-menu.open {
            display: block;
            animation: fadeSlide .3s ease-out forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Desktop menu hover underline */
        .nav-link {
            color: #0C2340;
            position: relative;
            transition: .3s;
        }
        .nav-link:hover {
            color: #F5C642;
        }
        .underline-hover {
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 3px;
            background: #F5C642;
            transition: width .3s;
        }
        .group:hover .underline-hover {
            width: 100%;
        }

        /* Mobile menu items */
        .mobile-item {
            display: block;
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            color: #0C2340;
            font-weight: 500;
        }
        .mobile-item:hover {
            background: #f5f5f5;
        }

        /* Theme toggle button */
        .theme-toggle-btn {
            background: transparent;
            border: 1px solid #d1d5db;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .3s;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.1);
            background-color: rgba(255,255,255,0.15);
        }

        .theme-icon-dark {
            display: none;
        }
        .dark .theme-icon-light {
            display: none;
        }
        .dark .theme-icon-dark {
            display: block;
        }

        /* DARK MODE OVERRIDES */
        .dark body {
            background-color: #111827 !important;
            color: #f3f4f6 !important;
        }
        .dark nav {
            background-color: #1f2937 !important;
        }
        .dark .mobile-item {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
        }
        .dark .mobile-item:hover {
            background-color: #374151 !important;
        }
        .dark .nav-link {
            color: #e5e7eb !important;
        }
        .dark .nav-link:hover {
            color: #F5C642 !important;
        }
    </style>
</head>

<body class="bg-white theme-transition">

    <!-- TOP INFO BAR -->
    <div class="bg-gradient-to-br from-gray-900 to-gray-800 text-white text-sm py-2 theme-transition">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row justify-between items-center">
                
                <div class="flex items-center space-x-4 mb-2 sm:mb-0">
                    <div class="flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28l1.498 4.493-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257 4.493 1.498V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                        </svg>
                        <span>+61 3 9000 0000</span>
                    </div>

                    <div class="hidden md:flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8v10a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"></path>
                        </svg>
                        <span>info@aibc.org.au</span>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <a href="#" class="hover:text-secondary">Media</a>
                    <a href="#" class="hover:text-secondary">Careers</a>
                    <a href="#" class="hover:text-secondary">Accessibility</a>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-white shadow-lg theme-transition">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex justify-between items-center h-20">

                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-36 rounded-lg overflow-hidden">
                        <img src="images/Logo.png" class="w-full h-full object-cover">
                    </div>
                </a>

                <!-- DESKTOP MENU -->
                <div class="hidden lg:flex items-center space-x-8 font-medium">

                    <a href="index.html" class="nav-link group">Home <span class="underline-hover"></span></a>
                    <a href="about.html" class="nav-link group">About <span class="underline-hover"></span></a>
                    <a href="political.html" class="nav-link group">Political <span class="underline-hover"></span></a>
                    <a href="strategicapproach.html" class="nav-link group">Strategic Approach <span class="underline-hover"></span></a>
                    <a href="charitablecause.html" class="nav-link group">Charity <span class="underline-hover"></span></a>
                    <a href="leadership.html" class="nav-link group">Leadership <span class="underline-hover"></span></a>

                    <a href="contact.html"
                        class="bg-gradient-to-br from-gray-900 to-gray-800 text-white px-6 py-2.5 rounded-lg shadow-md hover:bg-yellow-500">
                        Get in Touch
                    </a>

                    <!-- DESKTOP THEME BUTTON -->
                    <button id="themeToggle" class="theme-toggle-btn ml-4" aria-label="Toggle Theme">
                        <svg class="theme-icon-light w-6 h-6" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path d="M12 1v2M12 21v2M1 12h2M21 12h2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                        </svg>

                        <svg class="theme-icon-dark w-6 h-6 text-yellow-400" fill="currentColor"
                            viewBox="0 0 24 24">
                            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"></path>
                        </svg>
                    </button>

                </div>

                <!-- MOBILE MENU BUTTON -->
                <button id="mobileBtn" class="lg:hidden p-2 text-primary">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

            </div>
        </div>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu"
        class="mobile-menu absolute top-20 left-0 w-full bg-white shadow-lg lg:hidden z-50 theme-transition">

        <a href="index.html" class="mobile-item">Home</a>
        <a href="about.html" class="mobile-item">About</a>
        <a href="political.html" class="mobile-item">Political</a>
        <a href="strategicapproach.html" class="mobile-item">Strategic Approach</a>
        <a href="charitablecause.html" class="mobile-item">Charity</a>
        <a href="leadership.html" class="mobile-item">Leadership</a>
        <a href="contact.html" class="mobile-item">Contact</a>

        <!-- MOBILE THEME BUTTON -->
        <button id="themeToggleMobile" class="theme-toggle-btn mx-auto my-4">
            <svg class="theme-icon-light w-6 h-6" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M1 12h2M21 12h2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>

            <svg class="theme-icon-dark w-6 h-6 text-yellow-400" fill="currentColor"
                viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"></path>
            </svg>
        </button>
    </div>

    <!-- SCRIPTS -->
    <script>
        const mobileBtn = document.getElementById("mobileBtn");
        const mobileMenu = document.getElementById("mobileMenu");

        mobileBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("open");
        });
    </script>

    <!-- Dark mode logic handled in js/dark-mode.js -->
    <script src="js/dark-mode.js"></script>

</body>

</html>
