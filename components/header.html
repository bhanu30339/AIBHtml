<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBF Header</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Mobile Menu Hidden by Default */
        .mobile-menu {
            display: none;
        }

        /* Mobile Menu Open Animation */
        .mobile-menu.open {
            display: block;
            animation: fadeSlide 0.3s ease-out forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Desktop Nav Hover Line */
        .nav-link {
            color: #0C2340;
            position: relative;
            transition: color .3s;
        }

        .nav-link:hover {
            color: #F5C642;
        }

        .underline-hover {
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 3px;
            background: #F5C642;
            transition: width .3s;
        }

        .group:hover .underline-hover {
            width: 100%;
        }

        /* Mobile Menu Items */
        .mobile-item {
            display: block;
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            color: #0C2340;
            font-weight: 500;
            background: white;
        }

        .mobile-item:hover {
            background: #f5f5f5;
        }
    </style>
</head>

<body class="bg-white">

    <!-- ============================
            TOP INFO BAR
    ================================= -->
    <div class="bg-primary text-white text-sm py-2">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row justify-between items-center">

                <!-- Left Info -->
                <div class="flex items-center space-x-4 mb-2 sm:mb-0">

                    <!-- Phone -->
                    <div class="flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                            </path>
                        </svg>
                        <span>+61 3 9000 0000</span>
                    </div>

                    <!-- Email -->
                    <div class="hidden md:flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                        <span>info@aibc.org.au</span>
                    </div>
                </div>

                <!-- Right Info -->
                <div class="flex items-center space-x-4">
                    <a href="#" class="hover:text-secondary transition-colors">Media</a>
                    <a href="#" class="hover:text-secondary transition-colors">Careers</a>
                    <a href="#" class="hover:text-secondary transition-colors">Accessibility</a>
                    <button class="p-1 hover:text-secondary">EN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================
            NAVIGATION BAR
    ================================= -->
    <nav class="sticky top-0 z-50 bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">

                <!-- Logo -->
                <a href="index.html" class="flex items-center space-x-3">

                    <div class="w-24 h-auto rounded-lg overflow-hidden flex items-center justify-center">
                        <img src="images/Logo.jpg" alt="AIBF Logo" class="w-full h-full object-cover">
                    </div>

                    <div>
                        <h1 class="text-primary font-bold text-xl tracking-tight">Australia India</h1>
                        <p class="text-secondary text-xs tracking-widest uppercase">Bridge Foundation</p>
                    </div>
                </a>

                <!-- DESKTOP MENU -->
                <div class="hidden lg:flex items-center space-x-8 font-medium">

                    <a href="index.html" class="nav-link group">Home
                        <span class="underline-hover"></span>
                    </a>

                    <a href="about.html" class="nav-link group">About
                        <span class="underline-hover"></span>
                    </a>

                    <a href="political.html" class="nav-link group">Political
                        <span class="underline-hover"></span>
                    </a>

                    <a href="strategicapproach.html" class="nav-link group">Strategic Approach
                        <span class="underline-hover"></span>
                    </a>

                    <a href="charitablecause.html" class="nav-link group">Charity
                        <span class="underline-hover"></span>
                    </a>

                    <a href="leadership.html" class="nav-link group">Leadership
                        <span class="underline-hover"></span>
                    </a>

                    <a href="contact.html"
                        class="bg-secondary text-primary px-6 py-2.5 rounded-lg font-semibold hover:bg-yellow-500 transition-colors shadow-md">
                        Get in Touch
                    </a>
                </div>

                <!-- MOBILE MENU BUTTON -->
                <button id="mobileBtn" class="lg:hidden p-2 text-primary">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

            </div>
        </div>
    </nav>

    <!-- ============================
            MOBILE DROPDOWN MENU
    ================================= -->
    <div id="mobileMenu"
        class="mobile-menu absolute top-20 left-0 w-full bg-white shadow-lg lg:hidden z-50">

        <a href="index.html" class="mobile-item">Home</a>
        <a href="about.html" class="mobile-item">About</a>
        <a href="political.html" class="mobile-item">Political</a>
        <a href="strategicapproach.html" class="mobile-item">Strategic Approach</a>
        <a href="charitablecause.html" class="mobile-item">Charity</a>
        <a href="leadership.html" class="mobile-item">Leadership</a>
        <a href="contact.html" class="mobile-item">Contact</a>

    </div>

    <!-- ============================
            MOBILE MENU SCRIPT
    ================================= -->
    <script>
        const mobileBtn = document.getElementById('mobileBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        mobileBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
        });
    </script>

</body>

</html>
