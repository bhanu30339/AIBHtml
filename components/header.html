        /* Smooth theme fade */
        .theme-transition {

        .mobile-menu.open {

            transition: width .3s;

        .group:hover .underline-hover {

        /* Language dropdown */
        .language-dropdown {

    <script>
        // Mobile Menu Toggle
        const mobileBtn = document.getElementById("mobileBtn");
        const mobileMenu = document.getElementById("mobileMenu");

        mobileBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("open");
            // Close other dropdowns when mobile menu opens
            searchDropdown.classList.remove("open");
            languageDropdown.classList.remove("open");
        });

        // Search Dropdown Toggle
        const searchBtn = document.getElementById("searchBtn");
        const searchDropdown = document.getElementById("searchDropdown");

        searchBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            searchDropdown.classList.toggle("open");
            languageDropdown.classList.remove("open");
        });

        // Language Dropdown Toggle
        const languageBtn = document.getElementById("languageBtn");
        const languageDropdown = document.getElementById("languageDropdown");

        languageBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            languageDropdown.classList.toggle("open");
            searchDropdown.classList.remove("open");
        });

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchBtn.contains(e.target) && !searchDropdown.contains(e.target)) {
                searchDropdown.classList.remove('open');
            }
            if (!languageBtn.contains(e.target) && !languageDropdown.contains(e.target)) {
                languageDropdown.classList.remove('open');
            }
            if (!mobileBtn.contains(e.target) && !mobileMenu.contains(e.target) && !e.target.closest('.mobile-item')) {
                mobileMenu.classList.remove('open');
            }
        });

        // Language Selection
        document.querySelectorAll('#languageDropdown button').forEach(button => {
            button.addEventListener('click', () => {
                const lang = button.textContent.split('(')[1].replace(')', '').trim();
                const langName = button.querySelector('span:first-child').textContent;
                languageBtn.querySelector('span:nth-child(2)').textContent = lang;
                // In a real implementation, you would change the language here
                console.log(`Language changed to: ${langName} (${lang})`);
                languageDropdown.classList.remove('open');
            });
        });

        // Search functionality
        const searchInput = document.querySelector('#searchDropdown input');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (query.trim()) {
                    // In a real implementation, you would redirect to search results
                    console.log(`Searching for: ${query}`);
                    window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>

    <!-- Dark mode script -->
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeToggleMobile = document.getElementById('themeToggleMobile');
        const html = document.documentElement;

        // Check for saved theme or prefer-color-scheme
        const savedTheme = localStorage.getItem('theme') || 
                         (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        if (savedTheme === 'dark') {
            html.classList.add('dark');
        }

        function toggleTheme() {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggle.addEventListener('click', toggleTheme);
        themeToggleMobile.addEventListener('click', toggleTheme);
    </script>
